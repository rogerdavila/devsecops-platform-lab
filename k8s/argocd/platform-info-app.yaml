apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-info-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rogerdavila/devsecops-platform-lab.git
    targetRevision: HEAD
    path: k8s/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
