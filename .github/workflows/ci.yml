name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: platform-info-api
  REGISTRY: ghcr.io

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install black ruff
      - run: black --check app/src app/tests
      - run: ruff check app/src app/tests

  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/python --error app/src

  sca:
    name: SCA — pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: app/requirements.txt

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements-dev.txt
        working-directory: app
      - run: pytest --cov=src --cov-fail-under=80 --cov-report=term-missing
        working-directory: app

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-format, sast, sca, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} ./app
      - name: Save image artifact
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > image.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  scan:
    name: Image Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
      - name: Load image
        run: docker load < image.tar.gz
      - name: Scan for CRITICAL CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL

  sbom:
    name: SBOM — CycloneDX
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
      - name: Load image
        run: docker load < image.tar.gz
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: cyclonedx
          output: sbom.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
      - name: Load image
        run: docker load < image.tar.gz
      - name: Start container
        run: |
          docker run -d --name api \
            -p 8080:8080 -p 9090:9090 \
            -e VERSION=0.1.0 \
            -e ENVIRONMENT=dev \
            -e BUILD_ID=${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Wait for readiness
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/ready && break || sleep 2
          done
      - name: Validate /health
        run: |
          curl -sf http://localhost:8080/health | python3 -c "
          import sys, json
          b = json.load(sys.stdin)
          assert b['alive'] is True
          assert 'checked_at' in b
          print('PASS /health')
          "
      - name: Validate /ready
        run: |
          curl -sf http://localhost:8080/ready | python3 -c "
          import sys, json
          b = json.load(sys.stdin)
          assert b['ready'] is True
          print('PASS /ready')
          "
      - name: Validate /info
        run: |
          curl -sf http://localhost:9090/info | python3 -c "
          import sys, json
          b = json.load(sys.stdin)
          assert all(k in b for k in ('version', 'environment', 'build_id'))
          assert all(b[k] for k in ('version', 'environment', 'build_id'))
          print('PASS /info')
          "
      - name: Validate /metrics
        run: |
          output=$(curl -sf http://localhost:9090/metrics)
          echo "$output" | grep -q 'process_uptime_seconds' || { echo 'FAIL /metrics'; exit 1; }
          echo 'PASS /metrics'
      - name: Container logs on failure
        if: failure()
        run: docker logs api

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [scan, sbom, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
      - name: Load image
        run: docker load < image.tar.gz
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push
        run: |
          FULL=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $FULL:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $FULL:latest
          docker push $FULL:${{ github.sha }}
          docker push $FULL:latest
